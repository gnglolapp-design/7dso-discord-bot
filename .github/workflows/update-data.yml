name: update-7dso-data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./scraper[browser]"
          python -m playwright install chromium

      - name: Run scraper
        run: |
          7dso-scraper --site all --max-pages 800 --out scrape-data --sqlite

      - name: Build JSON for bot
        run: |
          python scripts/build_bot_data.py

      - name: Write last refresh stamp
        run: |
          mkdir -p .bot-state
          printf '%s' "$NOW_ISO" > .bot-state/last_refresh.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data .bot-state scrape-data || true
          git diff --cached --quiet || git commit -m "chore: refresh 7dso data"
          git push



